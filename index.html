<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股個股新聞搜尋</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f3ee; --surface: #ffffff; --surface2: #eeebe4;
    --border: #d6d0c4; --text: #1a1814; --text-muted: #6b6457;
    --text-hint: #9e9487; --accent: #c84b2f; --accent-light: #fdf1ee;
    --accent-border: #f0c4b8;
    --mono: 'DM Mono', monospace; --sans: 'Noto Sans TC', sans-serif;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

  .header {
    background: var(--text); color: #f5f3ee; padding: 16px 32px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-logo { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; opacity: 0.6; text-transform: uppercase; }
  .header-title { font-size: 14px; font-weight: 500; }
  .header-date { font-family: var(--mono); font-size: 11px; opacity: 0.45; }

  .main { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

  .hero { margin-bottom: 32px; }
  .hero-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-hint); margin-bottom: 8px; }
  .hero-heading { font-size: 30px; font-weight: 700; line-height: 1.25; letter-spacing: -0.02em; margin-bottom: 8px; }
  .hero-heading span { color: var(--accent); }
  .hero-sub { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

  .search-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px; margin-bottom: 16px;
    display: flex; gap: 10px;
  }
  .input-wrap { flex: 1; position: relative; }
  .input-label {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
    color: var(--text-hint); text-transform: uppercase; pointer-events: none;
  }
  .stock-input {
    width: 100%; height: 46px; padding: 0 14px 0 76px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); font-family: var(--mono); font-size: 20px;
    font-weight: 500; color: var(--text); letter-spacing: 0.05em; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .stock-input:focus { border-color: var(--text); box-shadow: 0 0 0 3px rgba(26,24,20,0.08); background: #fff; }
  .stock-input.shake { animation: shake 0.35s ease; border-color: var(--accent); }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)} 80%{transform:translateX(-3px)} }

  .search-btn {
    height: 46px; padding: 0 22px; background: var(--text); color: #f5f3ee;
    border: none; border-radius: 8px; font-family: var(--sans); font-size: 14px;
    font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px;
    transition: background 0.15s, transform 0.1s; white-space: nowrap;
  }
  .search-btn:hover { background: #2e2b26; }
  .search-btn:active { transform: scale(0.97); }
  .search-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .quick-picks { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
  .quick-label { font-size: 12px; color: var(--text-hint); }
  .quick-chip {
    font-family: var(--mono); font-size: 12px; padding: 4px 10px;
    border: 1px solid var(--border); border-radius: 99px;
    background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s;
  }
  .quick-chip:hover { border-color: var(--text); color: var(--text); background: var(--surface2); }

  /* Progress */
  .progress-wrap { margin-bottom: 20px; display: none; }
  .progress-wrap.show { display: block; }
  .progress-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; display: flex; justify-content: space-between; }
  .progress-bar-bg { height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 4px; background: var(--text); border-radius: 99px; transition: width 0.4s ease; width: 0%; }
  .source-status { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .src-pill {
    font-family: var(--mono); font-size: 11px; padding: 3px 9px;
    border-radius: 99px; border: 1px solid var(--border);
    color: var(--text-hint); background: var(--surface); transition: all 0.3s;
  }
  .src-pill.loading { border-color: #b0aa9e; color: var(--text-muted); }
  .src-pill.done { border-color: #2a6e4a; color: #2a6e4a; background: #edf5f0; }
  .src-pill.fail { border-color: var(--accent-border); color: var(--accent); background: var(--accent-light); text-decoration: line-through; }

  .error-bar {
    display: none; padding: 13px 16px; border-radius: 8px; margin-bottom: 20px;
    background: var(--accent-light); border: 1px solid var(--accent-border); color: var(--accent);
  }
  .error-bar.show { display: block; }
  .err-main { font-size: 14px; margin-bottom: 4px; font-weight: 500; }
  .err-detail { font-family: var(--mono); font-size: 11px; opacity: 0.7; }

  .results-header { display: none; justify-content: space-between; align-items: baseline; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .results-header.show { display: flex; }
  .results-title { font-size: 15px; font-weight: 500; }
  .results-meta { font-family: var(--mono); font-size: 12px; color: var(--text-hint); }

  /* Source filter tabs */
  .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .f-tab {
    font-family: var(--mono); font-size: 11px; padding: 4px 11px;
    border-radius: 99px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s;
  }
  .f-tab:hover { border-color: var(--text); color: var(--text); }
  .f-tab.active { background: var(--text); color: #f5f3ee; border-color: var(--text); }

  /* Cards */
  .news-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 10px; overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
    animation: fadeUp 0.25s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .news-card:hover { border-color: #b0aa9e; box-shadow: 0 2px 14px rgba(0,0,0,0.07); }
  .news-card.latest { border-left: 3px solid var(--accent); }
  .news-card a { display: block; padding: 15px 18px; text-decoration: none; color: inherit; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
  .news-title { font-size: 15px; font-weight: 500; line-height: 1.55; color: var(--text); flex: 1; transition: color 0.15s; }
  .news-card:hover .news-title { color: var(--accent); }
  .badge-new { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 7px; border-radius: 4px; background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-border); flex-shrink: 0; margin-top: 2px; }
  .news-summary { font-size: 13px; color: var(--text-muted); line-height: 1.65; margin-bottom: 11px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .source-badge { font-size: 11px; padding: 2px 8px; background: var(--surface2); border-radius: 4px; color: var(--text-muted); font-weight: 500; }
  .news-date { font-family: var(--mono); font-size: 11px; color: var(--text-hint); }
  .link-hint { margin-left: auto; font-size: 11px; color: var(--text-hint); display: flex; align-items: center; gap: 3px; transition: color 0.15s; }
  .news-card:hover .link-hint { color: var(--accent); }

  .empty-state { display: none; text-align: center; padding: 56px 20px; color: var(--text-hint); }
  .empty-state.show { display: block; }
  .empty-state svg { margin: 0 auto 14px; display: block; opacity: 0.3; }
  .empty-state p { font-size: 14px; line-height: 1.8; }

  .welcome-state { text-align: center; padding: 48px 20px; color: var(--text-hint); }
  .state-icon { width: 54px; height: 54px; background: var(--surface2); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
  .welcome-state p { font-size: 14px; line-height: 1.7; }

  .page-footer { text-align: center; font-family: var(--mono); font-size: 11px; color: var(--text-hint); margin-top: 48px; letter-spacing: 0.05em; }
</style>
</head>
<body>

<header class="header">
  <span class="header-logo">TWSE · News Tracker</span>
  <span class="header-title">台股個股新聞</span>
  <span class="header-date" id="headerDate"></span>
</header>

<main class="main">
  <div class="hero">
    <p class="hero-eyebrow">Taiwan Stock Exchange · News Tracker</p>
    <h1 class="hero-heading">個股新聞<span>．</span>即時追蹤</h1>
    <p class="hero-sub">同時搜尋多個優質財經媒體，近一週新聞依日期由新至舊排列。</p>
  </div>

  <div class="search-box">
    <div class="input-wrap">
      <span class="input-label">代號</span>
      <input class="stock-input" id="stockInput" type="text" placeholder="2330" maxlength="6" autocomplete="off">
    </div>
    <button class="search-btn" id="searchBtn" onclick="doSearch()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      搜尋新聞
    </button>
  </div>

  <div class="quick-picks">
    <span class="quick-label">常用：</span>
    <button class="quick-chip" onclick="quickSearch('2330')">2330 台積電</button>
    <button class="quick-chip" onclick="quickSearch('2317')">2317 鴻海</button>
    <button class="quick-chip" onclick="quickSearch('2454')">2454 聯發科</button>
    <button class="quick-chip" onclick="quickSearch('0050')">0050 元大台灣50</button>
    <button class="quick-chip" onclick="quickSearch('2603')">2603 長榮</button>
    <button class="quick-chip" onclick="quickSearch('2881')">2881 富邦金</button>
  </div>

  <!-- 進度條 -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressText">正在搜尋...</span>
      <span id="progressCount"></span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="source-status" id="sourceStatus"></div>
  </div>

  <div class="error-bar" id="errorBar">
    <div class="err-main" id="errMain"></div>
    <div class="err-detail" id="errDetail"></div>
  </div>

  <div class="results-header" id="resultsHeader">
    <span class="results-title" id="resultsTitle"></span>
    <span class="results-meta" id="resultsMeta"></span>
  </div>

  <div class="filter-tabs" id="filterTabs" style="display:none;"></div>
  <div id="newsList"></div>

  <div class="empty-state" id="emptyState">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
    <p>找不到近一週相關新聞<br><span style="font-size:12px;">請確認股票代號是否正確</span></p>
  </div>

  <div class="welcome-state" id="welcomeState">
    <div class="state-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#6b6457" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
    </div>
    <p>在上方輸入股票代號<br>即可搜尋近一週個股新聞</p>
  </div>

  <p class="page-footer">來源：經濟日報・工商時報・鉅亨網・MoneyDJ・Yahoo股市 &nbsp;·&nbsp; 免費・無需 API Key</p>
</main>

<script>
const stockNames = {
  '2330':'台積電','2317':'鴻海','2454':'聯發科','2881':'富邦金','2882':'國泰金',
  '2412':'中華電','2308':'台達電','3008':'大立光','2303':'聯電','1301':'台塑',
  '2002':'中鋼','2886':'兆豐金','6505':'台塑化','2357':'華碩','2382':'廣達',
  '3711':'日月光投控','5876':'上海商銀','2892':'第一金','2884':'玉山金',
  '0050':'元大台灣50','0056':'元大高股息','00878':'國泰永續高股息',
  '2337':'旺宏','2395':'研華','4938':'和碩','2379':'瑞昱','6669':'緯穎',
  '2345':'智邦','3045':'台灣大','4904':'遠傳','2609':'陽明','2603':'長榮',
  '2891':'中信金','2912':'統一超','1216':'統一','2301':'光寶科','2327':'國巨'
};

// 優質財經媒體 RSS（直接搜尋股票代號＋名稱）
// 用 Google News RSS 但指定優質來源，排除內容農場
function buildSources(code, name) {
  const kw = name ? `${code} ${name}` : code;
  const kwEnc = encodeURIComponent(kw);
  // 排除名單
  const exclude = '-CMoney -爆料同學會 -存股 -選股達人 -LINE -社群';
  const exEnc = encodeURIComponent(` ${exclude}`);

  return [
    {
      name: '經濟日報',
      url: `https://news.google.com/rss/search?q=${kwEnc}+site:money.udn.com${exEnc}&hl=zh-TW&gl=TW&ceid=TW:zh-Hant`
    },
    {
      name: '工商時報',
      url: `https://news.google.com/rss/search?q=${kwEnc}+site:ctee.com.tw${exEnc}&hl=zh-TW&gl=TW&ceid=TW:zh-Hant`
    },
    {
      name: '鉅亨網',
      url: `https://news.google.com/rss/search?q=${kwEnc}+site:cnyes.com${exEnc}&hl=zh-TW&gl=TW&ceid=TW:zh-Hant`
    },
    {
      name: 'MoneyDJ',
      url: `https://news.google.com/rss/search?q=${kwEnc}+site:moneydj.com${exEnc}&hl=zh-TW&gl=TW&ceid=TW:zh-Hant`
    },
    {
      name: '自由財經',
      url: `https://news.google.com/rss/search?q=${kwEnc}+site:ec.ltn.com.tw${exEnc}&hl=zh-TW&gl=TW&ceid=TW:zh-Hant`
    },
    {
      name: '聯合報',
      url: `https://news.google.com/rss/search?q=${kwEnc}+site:udn.com${exEnc}&hl=zh-TW&gl=TW&ceid=TW:zh-Hant`
    },
  ];
}

// CORS proxy（依序備援）
const PROXIES = [
  { build: u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`, extract: async r => { const j = await r.json(); return j.contents; } },
  { build: u => `https://corsproxy.io/?${encodeURIComponent(u)}`, extract: async r => r.text() },
  { build: u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`, extract: async r => r.text() },
];

async function fetchOneRSS(url) {
  let lastErr = null;
  for (const proxy of PROXIES) {
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 8000);
      const res = await fetch(proxy.build(url), { signal: ctrl.signal });
      clearTimeout(timer);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await proxy.extract(res);
      if (!text || text.length < 20) throw new Error('空回應');
      return text;
    } catch(e) {
      lastErr = e.name === 'AbortError' ? new Error('逾時') : e;
    }
  }
  throw lastErr;
}

function parseRSS(xmlText, sourceName) {
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, 'text/xml');
  if (xml.querySelector('parsererror')) return [];
  const items = Array.from(xml.querySelectorAll('item'));
  const weekAgo = Date.now() - 7 * 86400000;

  return items
    .map(item => {
      const title = clean(item.querySelector('title')?.textContent || '');
      if (!title) return null;

      // 提取 link（Google News RSS 放在 text node）
      let link = '';
      for (const node of item.childNodes) {
        if (node.nodeType === Node.TEXT_NODE && node.textContent.trim().startsWith('http')) {
          link = node.textContent.trim(); break;
        }
      }
      if (!link) link = clean(item.querySelector('link')?.textContent || '#');

      const pubDateStr = item.querySelector('pubDate')?.textContent || '';
      const pubDate = new Date(pubDateStr);
      const time = isNaN(pubDate.getTime()) ? 0 : pubDate.getTime();

      // 過濾一週外
      if (time > 0 && time < weekAgo) return null;

      const source = clean(item.querySelector('source')?.textContent || sourceName);
      const desc = clean(item.querySelector('description')?.textContent || '');

      return { title, link, source, desc, time, pubDate };
    })
    .filter(Boolean);
}

// 內容農場黑名單（標題或來源包含這些就丟掉）
const BLOCKLIST = ['cmoney', '爆料同學會', '存股', '選股達人', '小資', '飆股', '必買', '秘笈', '暴富'];

function isJunk(item) {
  const text = (item.title + item.source + item.desc).toLowerCase();
  return BLOCKLIST.some(kw => text.includes(kw.toLowerCase()));
}

// Header 日期
const today = new Date();
document.getElementById('headerDate').textContent =
  `${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}`;

document.getElementById('stockInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

function quickSearch(code) {
  document.getElementById('stockInput').value = code;
  doSearch();
}

function doSearch() {
  const code = document.getElementById('stockInput').value.trim().replace(/\s/g,'');
  if (!code) {
    const inp = document.getElementById('stockInput');
    inp.classList.remove('shake'); void inp.offsetWidth; inp.classList.add('shake');
    setTimeout(() => inp.classList.remove('shake'), 400);
    return;
  }
  fetchNews(code);
}

let allNews = [];
let currentFilter = '全部';

async function fetchNews(code) {
  const name = stockNames[code] || '';
  const displayName = name ? `${code}．${name}` : code;
  const sources = buildSources(code, name);

  // 重置 UI
  document.getElementById('welcomeState').style.display = 'none';
  document.getElementById('emptyState').classList.remove('show');
  document.getElementById('errorBar').classList.remove('show');
  document.getElementById('newsList').innerHTML = '';
  document.getElementById('resultsHeader').classList.remove('show');
  document.getElementById('filterTabs').style.display = 'none';
  document.getElementById('searchBtn').disabled = true;
  allNews = [];
  currentFilter = '全部';

  // 顯示進度條
  const pw = document.getElementById('progressWrap');
  pw.classList.add('show');
  document.getElementById('progressText').textContent = `正在搜尋「${displayName}」...`;
  document.getElementById('progressCount').textContent = `0 / ${sources.length}`;
  document.getElementById('progressFill').style.width = '0%';

  // 建立來源狀態 pills
  const ss = document.getElementById('sourceStatus');
  ss.innerHTML = '';
  const pills = {};
  sources.forEach(src => {
    const pill = document.createElement('span');
    pill.className = 'src-pill';
    pill.textContent = src.name;
    ss.appendChild(pill);
    pills[src.name] = pill;
  });

  // 並行抓取所有來源
  let doneCount = 0;
  const results = await Promise.allSettled(
    sources.map(async src => {
      pills[src.name].classList.add('loading');
      try {
        const xml = await fetchOneRSS(src.url);
        const items = parseRSS(xml, src.name);
        pills[src.name].classList.remove('loading');
        pills[src.name].classList.add('done');
        pills[src.name].textContent = `${src.name} (${items.length})`;
        return items;
      } catch(e) {
        pills[src.name].classList.remove('loading');
        pills[src.name].classList.add('fail');
        throw e;
      } finally {
        doneCount++;
        document.getElementById('progressCount').textContent = `${doneCount} / ${sources.length}`;
        document.getElementById('progressFill').style.width = `${Math.round(doneCount / sources.length * 100)}%`;
      }
    })
  );

  document.getElementById('searchBtn').disabled = false;
  document.getElementById('progressText').textContent = '搜尋完成';

  // 合併結果，去重，過濾垃圾
  const seen = new Set();
  results.forEach(r => {
    if (r.status === 'fulfilled') {
      r.value.forEach(item => {
        const key = item.title.slice(0, 30);
        if (!seen.has(key) && !isJunk(item)) {
          seen.add(key);
          allNews.push(item);
        }
      });
    }
  });

  // 排序：最新在前
  allNews.sort((a, b) => b.time - a.time);

  setTimeout(() => {
    pw.classList.remove('show');
    renderNews(allNews, displayName);
  }, 800);
}

function renderNews(items, displayName) {
  document.getElementById('emptyState').classList.remove('show');
  document.getElementById('newsList').innerHTML = '';

  if (items.length === 0) {
    document.getElementById('emptyState').classList.add('show');
    return;
  }

  // 結果 header
  const rh = document.getElementById('resultsHeader');
  rh.classList.add('show');
  document.getElementById('resultsTitle').textContent = `${displayName}　近一週新聞`;
  document.getElementById('resultsMeta').textContent = `共 ${allNews.length} 則`;

  // 來源篩選 tabs
  const sourcesInResult = ['全部', ...new Set(allNews.map(i => i.source))];
  const ft = document.getElementById('filterTabs');
  ft.style.display = 'flex';
  ft.innerHTML = '';
  sourcesInResult.forEach(src => {
    const btn = document.createElement('button');
    btn.className = 'f-tab' + (src === currentFilter ? ' active' : '');
    const count = src === '全部' ? allNews.length : allNews.filter(i => i.source === src).length;
    btn.textContent = `${src} (${count})`;
    btn.onclick = () => {
      currentFilter = src;
      document.querySelectorAll('.f-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filtered = src === '全部' ? allNews : allNews.filter(i => i.source === src);
      renderCards(filtered);
    };
    ft.appendChild(btn);
  });

  renderCards(items);
}

function renderCards(items) {
  const list = document.getElementById('newsList');
  list.innerHTML = '';
  items.forEach((item, i) => {
    const dateLabel = item.time ? formatDate(item.pubDate) : '';
    const card = document.createElement('div');
    card.className = 'news-card' + (i === 0 && currentFilter === '全部' ? ' latest' : '');
    card.style.animationDelay = `${Math.min(i * 35, 350)}ms`;
    card.innerHTML = `
      <a href="${esc(item.link)}" target="_blank" rel="noopener noreferrer">
        <div class="card-top">
          <span class="news-title">${esc(item.title)}</span>
          ${i === 0 && currentFilter === '全部' ? '<span class="badge-new">最新</span>' : ''}
        </div>
        ${item.desc ? `<p class="news-summary">${esc(item.desc)}</p>` : ''}
        <div class="card-footer">
          <span class="source-badge">${esc(item.source)}</span>
          ${dateLabel ? `<span class="news-date">${dateLabel}</span>` : ''}
          <span class="link-hint">閱讀原文
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>
            </svg>
          </span>
        </div>
      </a>`;
    list.appendChild(card);
  });
}

function formatDate(d) {
  const pad = n => String(n).padStart(2,'0');
  const s = `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  const h = Math.floor((Date.now()-d)/3600000);
  const day = Math.floor(h/24);
  const rel = h < 1 ? '剛剛' : h < 24 ? `${h} 小時前` : day <= 7 ? `${day} 天前` : '';
  return rel ? `${s}　（${rel}）` : s;
}

function clean(s) {
  return String(s).replace(/<[^>]+>/g,'')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g,' ')
    .trim();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
